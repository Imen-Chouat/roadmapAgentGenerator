<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Roadmap — GUIDE ME</title>
    <link rel="icon" type="image/png" href="../assets/images/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/components.css" />
    <link rel="stylesheet" href="../assets/css/chat.css" />
</head>

<body>
    <div class="chat-shell">
        <aside class="sidebar">
            <a href="../index.html" class="brand"><img src="../assets/images/logo.png" alt="GUIDE ME"
                    class="brand-logo" />
                <h2>GUIDE ME</h2>
            </a>
            <nav class="nav-list">
                <a class="nav-link" href="dashboard.html">🗺️ <span>Dashboard</span></a>
                <a class="nav-link active" href="new-roadmap.html">➕ <span>New Roadmap</span></a>
                <a class="nav-link" href="settings.html">⚙️ <span>Settings</span></a>
            </nav>
            <div class="sidebar-footer">
                <button id="btn-logout" class="btn btn-secondary" style="width:100%;">Logout</button>
            </div>
        </aside>

        <main class="chat-panel">
            <div class="chat-header">
                <button id="btn-toggle-sidebar" class="btn btn-secondary sidebar-toggle" aria-label="Toggle navigation"
                    aria-expanded="false">☰ Menu</button>
                <div>
                    <div style="display:flex; align-items:center; gap:1rem; flex-wrap:wrap;">
                        <h1 style="margin:0;">Create a new roadmap</h1>
                        <a href="dashboard.html" class="btn btn-secondary">← Back</a>
                    </div>
                    <p class="text-muted">Answer a few quick questions and let GUIDE ME build your path.</p>
                </div>
                <div class="chat-window">
                    <div id="bot-messages" class="messages"></div>
                </div>
                <form id="roadmap-chat-form" class="chat-input-row" novalidate>
                    <textarea id="roadmap-input" placeholder="Type your answer..." rows="2"></textarea>
                    <div class="send-row">
                        <button type="submit" class="btn">Send</button>
                    </div>
                </form>
                <div class="footer-note">GUIDE ME will save your roadmap locally once generated.</div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="../assets/js/ai.js"></script>
    <script src="../assets/js/storage.js"></script>
    <script src="../assets/js/generator.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/sidebar.js"></script>
    <script>document.addEventListener('DOMContentLoaded', () => { lucide && lucide.replace(); });</script>
</body>

</html>
